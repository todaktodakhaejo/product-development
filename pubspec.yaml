name: emotion_resolution_app
description: "감정을 흘려보내며 해소하는 앱 (Emotion Resolution App)"
publish_to: "none"
version: 0.1.4+5

environment:
  # Color.withValues / 최신 위젯 API 사용 → Flutter 3.27+ (Dart 3.6+)
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # 흔들기(GST-01) / 굴리기(GST-02) 용 기기 센서
  sensors_plus: ^6.0.1
  cupertino_icons: ^1.0.8
  # 온보딩 완료 여부 등 작은 설정을 기기에 영구 저장 (영구화 레이어)
  shared_preferences: ^2.3.2
  # 해소 의식 효과음(태우기·파쇄기·날리기·보석함) 재생
  audioplayers: ^6.1.0
  # 제품 분석 (PostHog). 감정 글 '내용'은 전송하지 않음 — docs/ANALYTICS.md 참고.
  posthog_flutter: ^5.24.0
  vibration: ^3.1.8

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

# 앱 런처 아이콘 생성 설정(감정 말랑이 — 핑크 젤리 공 / sky 배경).
# 소스 변경 후 `dart run flutter_launcher_icons`로 각 밀도·적응형 아이콘을 재생성한다.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png" # 레거시/iOS(풀블리드)
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 23
  # 적응형 아이콘(Android 8+): 배경 그라데이션 + 공(전경)
  adaptive_icon_background: "assets/icon/app_icon_bg.png"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"

flutter:
  uses-material-design: true
  shaders:
    - shaders/ball.frag
  assets:
    # 해소 의식 효과음 — 프로토타입(prototype-eight-bice.vercel.app) 원본 그대로.
    # fire/shred/firework/paper: 원본 mp3. jewel_*: 원본 Web Audio 합성음 오프라인 렌더(wav).
    - assets/audio/fire.mp3
    - assets/audio/shred.mp3
    - assets/audio/firework.mp3
    - assets/audio/paper.mp3
    - assets/audio/jewel_intake.wav
    - assets/audio/jewel_keep.wav
    # 종이비행기 발사 — 바람 가로지르는 whoosh(합성 생성).
    - assets/audio/whoosh.wav
    # 종이비행기 done — '하늘 두둥실' 포근한 앰비언트 루프(합성 생성).
    - assets/audio/sky_float.wav
    # 태우기 전소 후 — 잔불 타닥타닥 여운 루프(합성 생성).
    - assets/audio/crackle.wav
    # 오브제(공) 만지기 — slime 스퀴시 6슬라이스 + squelch(릴리스) 3슬라이스.
    - assets/audio/slime_0.wav
    - assets/audio/slime_1.wav
    - assets/audio/slime_2.wav
    - assets/audio/slime_3.wav
    - assets/audio/slime_4.wav
    - assets/audio/slime_5.wav
    - assets/audio/squelch_0.wav
    - assets/audio/squelch_1.wav
    - assets/audio/squelch_2.wav
    # 떡 늘어나는 쫀득·몰캉 스트레치(합성, 누를 때 레이어).
    - assets/audio/mochi_0.wav
    - assets/audio/mochi_1.wav
    - assets/audio/mochi_2.wav
    - assets/audio/mochi_3.wav
    # 문지르기 연속 루프(부드러운 soft rub, 끊김 없음).
    - assets/audio/rub.wav
    # 글쓰기 — 타이핑 5슬라이스.
    - assets/audio/type_0.wav
    - assets/audio/type_1.wav
    - assets/audio/type_2.wav
    - assets/audio/type_3.wav
    - assets/audio/type_4.wav
