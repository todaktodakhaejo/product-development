name: emotion_resolution_app
description: "감정을 흘려보내며 해소하는 앱 (Emotion Resolution App)"
publish_to: "none"
version: 0.1.0+1

environment:
  # Color.withValues / 최신 위젯 API 사용 → Flutter 3.27+ (Dart 3.6+)
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # 흔들기(GST-01) / 굴리기(GST-02) 용 기기 센서
  sensors_plus: ^6.0.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
