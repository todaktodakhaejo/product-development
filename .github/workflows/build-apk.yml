name: Build Android APK

# 테스터 사이드로딩 배포용 APK를 클라우드(GitHub Actions)에서 빌드한다.
# - 태그(vX.Y.Z) 푸시 → APK 빌드 + GitHub Release에 첨부(영구 다운로드 링크)
# - 수동 실행(workflow_dispatch) → APK 빌드 + 아티팩트 업로드(릴리스 없이 테스트)
# 서명: Secrets의 PKCS12 키스토어로 release 서명(일정한 키 → 테스터 업데이트 덮어쓰기 가능).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # Release 생성용(GITHUB_TOKEN)

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode release keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/upload-keystore.p12"

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Publish to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
